name: Bug
description: The scorer, analyser, or reporting engine does something it should not.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Input interaction and command used.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which component?
      options: [scorer, csat_analyser, responsibility, coaching, reporter, other]
    validations:
      required: true
